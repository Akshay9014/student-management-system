<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="container mt-4">

<div class="card">
<h3>Add Student</h3>

<form method="POST">

<input class="form-control mb-2" name="roll_no" placeholder="Roll No" required>
<input class="form-control mb-2" name="name" placeholder="Name" required>
<input class="form-control mb-2" name="enrollment_number" placeholder="Enrollment No" required>
<input class="form-control mb-2" name="course" placeholder="Course" required>
<input class="form-control mb-2" name="subject" placeholder="Subject" required>

<select class="form-control mb-2" name="submission">
<option>Yes</option>
<option>No</option>
</select>

<input class="form-control mb-2" type="number" name="marks" placeholder="Marks">

<button class="btn btn-success">Add</button>

</form>

</div>

</body>
</html>
